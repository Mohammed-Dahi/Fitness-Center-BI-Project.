<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جهاز تسجيل الحضور</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-dark text-white">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card p-4 shadow bg-secondary border-0">
            <h2 class="text-center mb-4 fw-bold">🎯 بوابات تسجيل الدخول</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} text-center fw-bold">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="/attendance" method="POST">
                <div class="mb-3">
                    <label class="form-label">رقم معرف العضو (Member ID)</label>
                    <input type="number" name="member_id" class="form-control form-control-lg text-center fw-bold" placeholder="مثال: 1 أو 2" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">بوابة الفرع</label>
                    <select name="branch_id" class="form-select form-select-lg">
                        {% for branch in branches %}
                        <option value="{{ branch.branch_id }}">{{ branch.branch_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-warning btn-lg w-100 mt-3 fw-bold text-dark">🔐 تمرير الكارت / تسجيل دخول</button>
                <a href="/" class="btn btn-link w-100 text-center text-white-50 mt-2">العودة للرئيسية</a>
            </form>
        </div>
    </div>
</body>
</html>
