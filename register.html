<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل عضو جديد</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card p-4 shadow border-0">
            <h2 class="text-center text-primary mb-4 fw-bold">📝 تسجيل عضو جديد</h2>
            <form action="/register" method="POST">
                <div class="row mb-3">
                    <div class="col">
                        <label class="form-label">الاسم الأول</label>
                        <input type="text" name="first_name" class="form-control" required>
                    </div>
                    <div class="col">
                        <label class="form-label">الاسم الأخير</label>
                        <input type="text" name="last_name" class="form-control" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">النوع</label>
                    <select name="gender" class="form-select">
                        <option value="Male">ذكر</option>
                        <option value="Female">أنثى</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">اختر باقة الاشتراك</label>
                    <select name="plan_id" class="form-select">
                        {% for plan in plans %}
                        <option value="{{ plan.plan_id }}">{{ plan.plan_name }} ({{ plan.price }} ج.م)</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">اختر فرع التدريب</label>
                    <select name="branch_id" class="form-select">
                        {% for branch in branches %}
                        <option value="{{ branch.branch_id }}">{{ branch.branch_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <button type="submit" class="btn btn-success btn-lg w-100 mt-3 fw-bold">حفظ العضو والاشتراك</button>
                <a href="/" class="btn btn-link w-100 text-center mt-2">العودة للرئيسية</a>
            </form>
        </div>
    </div>
</body>
</html>
